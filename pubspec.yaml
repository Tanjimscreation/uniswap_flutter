name: uniswap_flutter
description: A decentralized application for Uniswap trading built with Flutter.
publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  
  # Web3 and Wallet Connectivity
  web3dart: ^2.7.1
  walletconnect_flutter_v2: ^2.1.0
  http: ^1.1.0
  
  # UI and State Management
  provider: ^6.1.0
  get: ^4.6.5
  
  # QR Code
  qr_flutter: ^4.1.0
  qr_code_scanner: ^1.0.1
  
  # Networking and API
  dio: ^5.3.1
  
  # Storage
  shared_preferences: ^2.2.2
  
  # Utils
  intl: ^0.19.0
  animations: ^2.0.8
  google_fonts: ^6.1.0
  
  # Blockchain
  bip39: ^1.0.6
  ed25519_edwards: ^0.3.1

dev_dependencies:
  flutter_test:
    sdk: flutter
  
  flutter_lints: ^3.0.0

flutter:
  uses-material-design: true
  
  assets:
    - assets/images/
    - assets/icons/
